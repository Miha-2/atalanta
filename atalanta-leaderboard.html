<!doctype html>
<html lang="it" id="htmlRoot">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Atalanta BC – Classifica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:       #0d68b1;
      --blue-dark:  #042f56;
      --black:      #000000;
      --gold:       #c9a84c;
      --gold-light: #e2c06e;
      --white:      #ffffff;
      --text:       #ffffff;
      --muted:      #a8c4e0;
      --stripe-w:   48px;
      --silver:     #B0B8C1;
      --bronze:     #CD7F3A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      background-color: var(--black);
    }

    /* ── BACKGROUND: vertical blue/black stripes ── */
    .bg-fixed {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: repeating-linear-gradient(
        90deg,
        var(--blue-dark) 0px,
        var(--blue-dark) var(--stripe-w),
        var(--black)     var(--stripe-w),
        var(--black)     calc(var(--stripe-w) * 2)
      );
      background-size: calc(var(--stripe-w) * 2) 100%;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.75) 0%,
        rgba(4,47,86,0.60) 40%,
        rgba(0,0,0,0.82) 100%
      );
    }

    /* ── LANGUAGE TOGGLE (BVB-style, inline in nav-row) ── */
    .lang-toggle {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(201,168,76,0.3);
      flex-shrink: 0;
    }
    .lang-divider {
      width: 1px;
      height: 18px;
      background: rgba(201,168,76,0.25);
      flex-shrink: 0;
    }

    .lang-btn {
      appearance: none;
      border: 0;
      background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      padding: 7px 11px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .lang-btn.active { background: var(--gold); color: var(--black); }
    .lang-btn:not(.active):hover { color: var(--gold); }

    /* ── LAYOUT ── */
    .wrap {
      position: relative;
      z-index: 2;
      max-width: 520px;
      margin: 0 auto;
      padding: 1.2rem 18px 3rem;
    }

    /* ── NAV ROW ── */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--gold); }
    .nav-back::before { content: '←'; font-size: 16px; }

    /* ── HEADER ── */
    .hub-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
      margin-bottom: 24px;
      animation: fadeDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Eyebrow */
    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-bottom: 14px;
    }
    .eyebrow-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5) 60%, transparent);
    }
    .eyebrow-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(42px, 11vw, 56px);
      font-weight: 900;
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      color: var(--white);
      font-style: italic;
    }
    .header-title em { color: var(--gold); font-style: italic; }

    .header-sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 320px;
      margin-top: 4px;
    }

    .gold-rule {
      width: 48px;
      height: 2px;
      background: var(--gold);
      border: none;
      margin: 2px auto 0;
    }

    /* ── MATCH CONTEXT BAR ── */
    .match-context {
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(201,168,76,0.28);
      border-left: 4px solid var(--gold);
      position: relative;
      overflow: hidden;
      padding: 12px 16px;
      margin-bottom: 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 0 12px;
      animation: fadeUp 0.6s 0.08s cubic-bezier(0.22,1,0.36,1) both;
    }

    .match-context::before {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--blue) 0%, var(--gold) 100%);
    }

    .match-teams {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(13px, 3.8vw, 20px);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--white);
    }
    .match-teams .vs {
      color: var(--muted);
      font-weight: 700;
      font-size: 15px;
      margin: 0 4px;
    }
    .match-meta {
      font-size: clamp(9px, 2.4vw, 13px);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }
    .match-score-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 30px);
      color: var(--gold);
      letter-spacing: 0.08em;
      white-space: nowrap;
      line-height: 1;
      flex-shrink: 0;
    }
    .match-result-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      margin-top: 2px;
    }

    /* ── PODIUM ── */
    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 28px;
      animation: fadeUp 0.6s 0.14s cubic-bezier(0.22,1,0.36,1) both;
    }

    .podium-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0,0,0,0.92);
      border: 1px solid rgba(201,168,76,0.30);
      border-bottom: 3px solid transparent;
      padding: clamp(10px,3vw,16px) 6px clamp(10px,3vw,12px);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
      min-width: 0;
    }
    .podium-card:hover { transform: translateY(-2px); }

    .podium-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        rgba(13,104,177,0.04) 0px,
        rgba(13,104,177,0.04) 6px,
        transparent 6px,
        transparent 12px
      );
      pointer-events: none;
    }

    .podium-card.rank-1 {
      border-bottom-color: var(--gold);
      background: rgba(4,30,56,0.97);
      border-color: rgba(201,168,76,0.55);
      padding-top: clamp(14px,4vw,22px);
    }
    .podium-card.rank-2 { border-bottom-color: var(--silver); }
    .podium-card.rank-3 { border-bottom-color: var(--bronze); }

    .podium-rank {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(22px, 6vw, 38px);
      line-height: 1;
      margin-bottom: 6px;
      font-style: italic;
    }
    .rank-1 .podium-rank { color: var(--gold); }
    .rank-2 .podium-rank { color: var(--silver); }
    .rank-3 .podium-rank { color: var(--bronze); }

    .podium-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(11px,3vw,14px);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
      color: var(--white);
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .podium-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(16px,4.5vw,22px);
      color: var(--gold);
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 3px;
    }
    .podium-pts-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── LEADERBOARD TABLE ── */
    .lb-header {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      margin-bottom: 0;
    }

    .lb-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--black);
      background: var(--gold);
      padding: 5px 20px 5px 12px;
    }

    .lb-count {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--gold);
      padding: 5px 12px 5px 20px;
    }

    .lb-table { display: flex; flex-direction: column; gap: 0; }

    .lb-row {
      position: relative;
      display: grid;
      grid-template-columns: clamp(54px,14vw,70px) 1fr auto;
      align-items: center;
      overflow: hidden;
      cursor: default;
      border-bottom: 1px solid rgba(13,104,177,0.1);
      min-height: 54px;
      background: #0e1a24;
      transition: background 0.15s;
    }
    .lb-row:nth-child(even) { background: #091520; }
    .lb-row:hover { background: #122a42; }

    /* Stripe accent on left */
    .lb-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.15s;
    }
    .lb-row:hover::before { background: var(--blue); }

    /* "Tu" / highlight row */
    .lb-row.highlight {
      background: var(--gold) !important;
      border-bottom-color: rgba(0,0,0,0.1);
    }
    .lb-row.highlight::before { background: var(--blue-dark) !important; }
    .lb-row.highlight .lb-pos  { color: rgba(0,0,0,0.25); }
    .lb-row.highlight .lb-name { color: var(--black); }
    .lb-row.highlight .lb-trend { color: rgba(0,0,0,0.4); }
    .lb-row.highlight .lb-pts  { color: var(--black); }
    .lb-row.highlight .lb-you-tag { background: var(--black); color: var(--gold); }

    .lb-pos {
      position: relative;
      z-index: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 34px);
      line-height: 1;
      text-align: center;
      color: rgba(168,196,224,0.3);
      user-select: none;
      letter-spacing: -0.02em;
      font-style: italic;
    }

    .lb-info {
      position: relative;
      z-index: 1;
      padding: 10px 6px 10px 12px;
      min-width: 0;
    }

    .lb-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(14px, 3.8vw, 18px);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-you-tag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--gold);
      padding: 1px 6px;
      margin-top: 3px;
      clip-path: none;
      border-left: 2px solid var(--blue-dark);
    }

    .lb-trend { font-size: 12px; margin-left: 6px; vertical-align: middle; }
    .up   { color: #3ddc84; }
    .down { color: #ff6b6b; }
    .same { color: rgba(168,196,224,0.3); }

    .lb-pts-col {
      position: relative;
      z-index: 1;
      padding: 0 14px 0 8px;
      text-align: right;
      white-space: nowrap;
    }

    .lb-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(22px, 5vw, 28px);
      color: var(--text);
      line-height: 1;
      font-style: italic;
    }

    /* ── YOU CONTEXT (sticky) ── */
    .you-context {
      position: sticky;
      bottom: 0;
      z-index: 10;
      margin: 0 -18px;
      padding: 28px 18px 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    .you-context::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(2,20,38,0.97) 28px);
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: -1;
    }
    .you-context.no-bg::before {
      opacity: 0;
    }

    .you-gap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0 4px;
    }
    .you-gap::before, .you-gap::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201,168,76,0.2);
    }
    .you-gap-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.4);
      white-space: nowrap;
      transition: color 0.15s;
      cursor: pointer;
    }
    .you-gap-text:hover { color: var(--gold); }

    #lb-you .lb-row.neighbour {
      background: #07111a;
      opacity: 0.75;
    }
    #lb-you .lb-row.neighbour:hover { opacity: 1; }

    /* ── LOAD MORE ── */
    .load-more-wrap { margin-top: 16px; text-align: center; }
    .load-more {
      appearance: none;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 28px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .load-more:hover {
      background: var(--gold);
      color: var(--black);
      border-color: var(--gold);
    }

    /* ── FOOTER ── */
    .hub-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.8em;
      color: rgba(168,196,224,0.25);
      line-height: 1.6;
    }
    .hub-footer a { color: rgba(168,196,224,0.35); text-decoration: underline; }
    .hub-footer a:hover { color: var(--gold); }
    .hub-footer span { margin: 0 4px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-context { animation: fadeUp 0.5s 0.08s cubic-bezier(0.22,1,0.36,1) both; }
    .podium        { animation: fadeUp 0.5s 0.14s cubic-bezier(0.22,1,0.36,1) both; }
    .lb-table      { animation: fadeUp 0.5s 0.20s cubic-bezier(0.22,1,0.36,1) both; }
    .lb-row        { animation: fadeUp 0.3s ease both; }
    .lb-row:nth-child(1)  { animation-delay: .22s; }
    .lb-row:nth-child(2)  { animation-delay: .25s; }
    .lb-row:nth-child(3)  { animation-delay: .28s; }
    .lb-row:nth-child(4)  { animation-delay: .31s; }
    .lb-row:nth-child(5)  { animation-delay: .34s; }
    .lb-row:nth-child(6)  { animation-delay: .37s; }
    .lb-row:nth-child(7)  { animation-delay: .40s; }
    .lb-row:nth-child(8)  { animation-delay: .43s; }
    .lb-row:nth-child(9)  { animation-delay: .46s; }
    .lb-row:nth-child(10) { animation-delay: .49s; }

    [data-i18n] { transition: opacity 0.18s ease; }
    body.lang-switching [data-i18n] { opacity: 0; }

    @media (max-width: 400px) {
      .lb-row { grid-template-columns: 44px 1fr auto; }
    }
  </style>
</head>
<body>

  <div class="bg-fixed"></div>
  <div class="bg-overlay"></div>

  <!-- Language toggle -->

  <main class="wrap">

    <div class="nav-row">
      <a class="nav-back" href="atalanta-napovej-rezultat.html" data-i18n="nav_back">Torna al pronostico</a>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn active" id="btn-it" onclick="setLang('it')">IT</button>
        <span class="lang-divider"></span>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <!-- Header -->
    <header class="hub-header">
      <h1 class="header-title" id="header-title">Classifica<br><em>La Dea</em></h1>
      <hr class="gold-rule">
      <p class="header-sub" id="header-sub">La classifica dei tifosi nerazzurri che hanno inviato il loro pronostico.</p>
    </header>

    <!-- Match context -->
    <div class="match-context">
      <div>
        <div class="match-teams">Atalanta <span class="vs">vs</span> <span data-i18n="opponent">Brescia</span></div>
        <div class="match-meta" data-i18n="match_meta">Serie A · Gewiss Stadium · 12 Apr 2025</div>
      </div>
      <div style="text-align:right">
        <div class="match-score-badge">2 : 1</div>
        <div class="match-result-label" data-i18n="match_result_label">Risultato finale</div>
      </div>
    </div>

    <!-- Podium top 3 -->
    <div class="podium" id="podium"></div>

    <!-- Full leaderboard -->
    <div class="lb-header">
      <span class="lb-title" data-i18n="lb_title">Tutti i partecipanti</span>
      <span class="lb-count" data-i18n="pts_col_label">Pti</span>
    </div>

    <div class="lb-table" id="lb-table"></div>

    <div class="load-more-wrap">
      <button class="load-more" id="load-more-btn" data-i18n="load_more">Carica altri</button>
    </div>

    <!-- Sticky user position -->
    <div class="you-context" id="you-context">
      <div class="you-gap" id="you-gap"></div>
      <div class="lb-table" id="lb-you"></div>
    </div>

    <footer class="hub-footer">
      <a href="atalanta-napovej-rezultat.html" data-i18n="footer_predict">Invia pronostico</a>
      <span>·</span>
      <a href="#" data-i18n="footer_rules">Regolamento</a>
      <span>·</span>
      <a href="#" data-i18n="footer_privacy">Privacy Policy</a>
    </footer>

  </main>

  <script>
    /* ─── TRANSLATIONS ─── */
    const i18n = {
      it: {
        nav_back:           'Torna al pronostico',
        eyebrow:            'Concorso',
        header_title:       'Classifica<br><em>La Dea</em>',
        header_sub:         'La classifica dei tifosi nerazzurri che hanno inviato il loro pronostico.',
        opponent:           'Brescia',
        match_meta:         'Serie A · Gewiss Stadium · 12 Apr 2025',
        match_result_label: 'Risultato finale',
        lb_title:           'Tutti i partecipanti',
        load_more:          'Carica altri',
        pts_label:          'pti',
        pts_col_label:      'Pti',
        you_tag:            'Tu',
        you_position:       '↓ La tua posizione',
        footer_predict:     'Invia pronostico',
        footer_rules:       'Regolamento',
        footer_privacy:     'Privacy Policy',
        doc_title:          'Atalanta BC – Classifica',
      },
      en: {
        nav_back:           'Back to prediction',
        eyebrow:            'Competition',
        header_title:       'Leaderboard<br><em>La Dea</em>',
        header_sub:         'Rankings of all Nerazzurri supporters who submitted a prediction.',
        opponent:           'Brescia',
        match_meta:         'Serie A · Gewiss Stadium · 12 Apr 2025',
        match_result_label: 'Final score',
        lb_title:           'All participants',
        load_more:          'Load more',
        pts_label:          'pts',
        pts_col_label:      'Pts',
        you_tag:            'You',
        you_position:       '↓ Your position',
        footer_predict:     'Submit prediction',
        footer_rules:       'Contest rules',
        footer_privacy:     'Privacy Policy',
        doc_title:          'Atalanta BC – Leaderboard',
      }
    };

    let currentLang = 'it';

    function setLang(lang) {
      if (lang === currentLang) return;
      currentLang = lang;
      document.body.classList.add('lang-switching');
      setTimeout(() => { applyLang(lang); document.body.classList.remove('lang-switching'); }, 180);
    }

    function applyLang(lang) {
      const t = i18n[lang];
      document.getElementById('htmlRoot').lang = lang;
      document.title = t.doc_title;
      document.getElementById('header-title').innerHTML = t.header_title;
      document.getElementById('header-sub').textContent = t.header_sub;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.innerHTML = t[key];
      });
      document.getElementById('btn-it').classList.toggle('active', lang === 'it');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.querySelectorAll('.pts-label').forEach(el => el.textContent = t.pts_label);
      document.querySelectorAll('.lb-you-tag').forEach(el => el.textContent = t.you_tag);
    }

    /* ─── MOCK DATA ─── */
    const nicknames = [
      'NerazzurroFede','LaDea_Bergamo','CurvaNord1907','GewissKing',
      'Lookman_Fan','OrobicoPrimo','BergamascoBoss','AtalantaEterna',
      'Forza_Dea','IlNerazzurro','SerieAMago','StrikeZorzone',
      'BergamoBlue','BergamoBello','CittaAltaTifosi','DublinoWinner',
      'NeroDiNotte','LaMagliaFreda','AtalantaTre','LiberiDiSognare',
      'NerazzurriPride','DerbyBergamo','GewissArena','CampaniaTrasher',
      'GasperiniStyle','MiniussiGoal','AtalantaForte','SerieABoss',
      'KoopMeneer','OrobicaForza'
    ];

    const trends = ['up','up','same','down','up','same','same','down','up','down',
                    'same','up','down','same','up','down','up','same','down','up'];

    function randScore() {
      return `${Math.floor(Math.random()*5)} : ${Math.floor(Math.random()*5)}`;
    }
    function initials(nick) {
      return nick.replace(/[^a-zA-Z]/g, '').slice(0,2).toUpperCase();
    }

    const entries = Array.from({length: 20}, (_, i) => {
      const nick = nicknames[i % nicknames.length];
      return {
        name: nick,
        initials: initials(nick),
        pts: Math.floor(Math.random() * 80) + 20,
        pred: randScore(),
        trend: trends[i % trends.length],
        highlight: i === 7,
      };
    }).sort((a, b) => b.pts - a.pts);

    /* ─── RENDER PODIUM ─── */
    const podiumOrder = [1, 0, 2]; // visual: 2nd | 1st | 3rd
    const podiumEl = document.getElementById('podium');
    const rankColors = { 1: 'var(--gold)', 2: 'var(--silver)', 3: 'var(--bronze)' };

    podiumOrder.forEach(idx => {
      const e = entries[idx];
      const rank = idx + 1;
      podiumEl.innerHTML += `
        <div class="podium-card rank-${rank}">
          <div class="podium-rank">${rank}</div>
          <div class="podium-name">${e.name}</div>
          <div class="podium-pts">${e.pts} <span class="podium-pts-label pts-label">${i18n[currentLang].pts_label}</span></div>
        </div>`;
    });

    /* ─── RENDER TABLE (rows 4–n) ─── */
    const tableEl = document.getElementById('lb-table');
    const PAGE_SIZE = 10;

    // BVB-style cumulative score generation — scores decrease steadily, no random jumps
    const extraPool = [];
    let lastPts = entries[2].pts;
    for (let i = 0; i < 96; i++) {
      lastPts = Math.max(1, lastPts - Math.floor(Math.random() * 3 + 1));
      extraPool.push({
        name: nicknames[(i + 3) % nicknames.length] + (i >= nicknames.length ? `_${Math.floor(i / nicknames.length)}` : ''),
        pts: lastPts,
        trend: trends[i % trends.length],
      });
    }

    let visibleCount = 0;

    function appendRows(from, to) {
      extraPool.slice(from, to).forEach((e, i) => {
        const pos = from + i + 4;
        const trendIcon = { up: '▲', down: '▼', same: '—' }[e.trend];
        const row = document.createElement('div');
        row.className = 'lb-row';
        row.innerHTML = `
          <div class="lb-pos">${pos}</div>
          <div class="lb-info">
            <div class="lb-name">${e.name} <span class="lb-trend ${e.trend}">${trendIcon}</span></div>
          </div>
          <div class="lb-pts-col">
            <span class="lb-pts">${e.pts}</span>
          </div>`;
        tableEl.appendChild(row);
      });
    }

    function loadMore() {
      const from = visibleCount;
      const to   = Math.min(visibleCount + PAGE_SIZE, extraPool.length);
      appendRows(from, to);
      visibleCount = to;

      const btn = document.getElementById('load-more-btn');
      if (visibleCount >= extraPool.length) {
        btn.style.display = 'none';
      } else {
        btn.textContent = i18n[currentLang].load_more;
      }
    }

    loadMore();

    document.getElementById('load-more-btn').addEventListener('click', loadMore);

    /* ─── YOU CONTEXT ─── */
    const YOU_POS  = 1907;
    const youEntry = { name: 'NerazzurroFede', pts: 7, trend: 'down' };
    const above    = { name: 'LiberiDiSognare', pts: 8, trend: 'same' };
    const below    = { name: 'BergamoBello',    pts: 6, trend: 'up'   };

    const youGapEl = document.getElementById('you-gap');
    const youEl    = document.getElementById('lb-you');

    // BVB-style: show arrow + label, scroll to bottom on click
    youGapEl.innerHTML = `<span class="you-gap-text" id="you-gap-text" data-i18n="you_position" style="cursor:pointer">↓ La tua posizione</span>`;

    document.getElementById('you-gap-text').addEventListener('click', () => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });

    const youRows = [
      { e: above,    pos: YOU_POS - 1, cls: 'neighbour' },
      { e: youEntry, pos: YOU_POS,     cls: 'highlight'  },
      { e: below,    pos: YOU_POS + 1, cls: 'neighbour'  },
    ];

    youRows.forEach(({ e, pos, cls }) => {
      const trendIcon = { up: '▲', down: '▼', same: '—' }[e.trend];
      const t = i18n[currentLang];
      const youTag = cls === 'highlight'
        ? `<span class="lb-you-tag">${t.you_tag}</span>` : '';
      youEl.innerHTML += `
        <div class="lb-row ${cls}">
          <div class="lb-pos">${pos}</div>
          <div class="lb-info">
            <div class="lb-name">${e.name} <span class="lb-trend ${e.trend}">${trendIcon}</span></div>
            ${youTag}
          </div>
          <div class="lb-pts-col">
            <span class="lb-pts">${e.pts}</span>
          </div>
        </div>`;
    });
    /* ─── HIDE YOU-CONTEXT GRADIENT WHEN NOTHING SCROLLS BEHIND IT ─── */
    const youContext = document.getElementById('you-context');

    function updateGradient() {
      const barTop = youContext.getBoundingClientRect().top;
      const rows = document.querySelectorAll('#lb-table .lb-row, .load-more-wrap');
      let anyBehind = false;
      rows.forEach(row => {
        if (row.getBoundingClientRect().bottom > barTop) anyBehind = true;
      });
      youContext.classList.toggle('no-bg', !anyBehind);
    }

    window.addEventListener('scroll', updateGradient, { passive: true });
    updateGradient();
  </script>

</body>
</html>
